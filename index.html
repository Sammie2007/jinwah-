<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jinwah: Voidheart | Official </title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">VOIDHEART</a>
        <button class="theme-toggle" id="theme-btn">LIGHT / DARK</button>
    </nav>

    <main id="main-ui">
        <header class="hero">
            <h1>JINWAH</h1>
            <p class="subtitle">THE VOIDHEART SAGA</p>
        </header>

        <section class="archive-section">
            <h2 class="section-title">THE ARCHIVE</h2>
            <div id="chapter-list" class="card-grid">
                </div>
        </section>

        <section class="contact-section">
            <h2 class="section-title">CONTACT THE AUTHOR</h2>
            <form name="author-contact" method="POST" data-netlify="true" class="contact-form">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" placeholder="Message to the Author..." required></textarea>
                <button type="submit" class="btn">TRANSMIT</button>
            </form>
        </section>

        <footer>
            <p>© 2026 Sammie. Built in the Void.</p>
        </footer>
    </main>

    <section id="reader-ui" style="display:none;">
        <div class="reader-container">
            <button class="btn" id="back-btn">← BACK TO ARCHIVE</button>
            <h1 id="reader-title"></h1>
            <div id="content-body">Consulting the Void...</div>

            <div class="comments-section">
                <h2 class="section-title">COMMENTS</h2>
                <div id="giscus-container"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
